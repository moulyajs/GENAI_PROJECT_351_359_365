version: '3.8'

services:
  security_app:
    build: .
    container_name: security_app
    ports:
      - "8501:8501"
    volumes:
      - .:/app
    environment:
      # OLLAMA_HOST connects the container to the host machine's Ollama instance.
      - OLLAMA_HOST=http://host.docker.internal:11434
    extra_hosts:
      # Required for Linux Docker to resolve host.docker.internal
      - "host.docker.internal:host-gateway"
      
    # ---------------------------------------------------------
    # GPU CONFIGURATION:
    # If running on a GPU-enabled Ubuntu system, uncomment the 
    # 'deploy' block below to pass NVIDIA drivers to Docker.
    # ---------------------------------------------------------
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]
