version: "3.8"

services:
  security_app:
    build: .
    container_name: security_app_cpu
    ports:
      - "8501:8501"
    volumes:
      - .:/app
    environment:
      - OLLAMA_HOST=http://host.docker.internal:11434 # For local run
      # - OLLAMA_HOST=http://[IP_ADDRESS]:11434 # For docker
    extra_hosts:
      - "host.docker.internal:host-gateway"
    profiles: ["cpu"]

  security_app_gpu:
    build: .
    container_name: security_app_gpu
    ports:
      - "8501:8501"
    volumes:
      - .:/app
    environment:
      - OLLAMA_HOST=http://host.docker.internal:11434 # For local run
      # - OLLAMA_HOST=http://[IP_ADDRESS]:11434 # For docker
      - NVIDIA_VISIBLE_DEVICES=all
    extra_hosts:
      - "host.docker.internal:host-gateway"
    deploy: {}
    gpus: all
    profiles: ["gpu"]